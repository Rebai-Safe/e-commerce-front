<div class="register">
  <div class="row">
    <div class="col-md-3 register-left">
      <img src="https://image.ibb.co/n7oTvU/logo_white.png" alt="" />
      <h3>Welcome</h3>
      <p>Do you already have an account?</p>
      <a class="btn btn-outline-danger" routerLink="/auth/login">
        Login <i class="fas fa-sign-in-alt"></i>
      </a>

    </div>
    <div class="col-md-9 register-right p-3 ">
      <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="profile" role="tabpanel" aria-labelledby="home-tab">
          
          <div class="row register-form">
            <form [formGroup]="registerForm" (ngSubmit)="register()" novalidate>
              <div formGroupName="profileCredentials">
                <h3 class="register-heading">Enter Personal Information</h3>
                <div class="d-flex justify-content-center mt-2">
                  <mat-form-field style="width: 300px;">
                    <input id="firstname" formControlName="firstName" aria-label="First Name" type="text" matInput
                      placeholder="First Name" required />
                     
                  </mat-form-field>
                </div>
                <div class="d-flex justify-content-center mt-2">
                  <mat-form-field style="width: 300px;" class="ml-3">
                    <input type="text" id="lastname" formControlName="lastName" matInput placeholder="Last Name"
                      aria-label="Last Name" required />
                  </mat-form-field>
                </div>


                <div class="d-flex justify-content-center mt-2">
                  <mat-form-field style="width: 300px;">
                    <input type="email" id="email" formControlName="email" aria-label="Email" matInput
                      placeholder="Email" required />
                  </mat-form-field>

                </div>

                
                <div class="d-flex justify-content-center mt-2">
                  <mat-select-country class="className"  appearance="outline"
                  label="Country"
                  formControlName="country"
                  placeholder="Country"></mat-select-country>
  
                 </div>
              </div>

              <h3 class="register-heading">Enter Connexion Information</h3>
              <div formGroupName="authCredentials">
               
                <div class="d-flex justify-content-center mt-2">
                  <mat-form-field style="width: 300px;">
                    <input type="text" id="username" placeholder="Username" formControlName="userName" matInput
                      aria-label="Username" required />
                  </mat-form-field>
                </div>
                <div class="d-flex justify-content-center mt-2">
                  <mat-form-field style="width: 300px;" class="ml-3">
                    <input type="password" id="password" formControlName="password" matInput aria-label="Password"
                      placeholder="Password" required />
                  </mat-form-field>
                </div>
              </div>
              <div class="d-flex justify-content-center mt-2">
              <button [disabled]="!registerForm.valid" class="btn btn-primary" type="submit">Register</button>
             </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
